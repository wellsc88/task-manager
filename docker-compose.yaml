services:

  postgres:
    image: postgres:16
    container_name: task-manager-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: task-manager-postgres-exporter
    restart: unless-stopped

    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"

    ports:
      - "9187:9187"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:9187/metrics || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: task-manager-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: task-manager-api
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8000/actuator/health || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  prometheus:
    image: prom/prometheus:latest
    container_name: task-manager-prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.retention.time=15d"

    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - ./prometheus/alerts.yaml:/etc/prometheus/alerts.yaml
      - prometheus_data:/prometheus

    depends_on:
      api:
        condition: service_healthy
      postgres-exporter:
        condition: service_healthy
      alertmanager:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:9090/-/healthy || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  alertmanager:
    image: prom/alertmanager:latest
    container_name: task-manager-alertmanager
    restart: unless-stopped

    ports:
      - "9093:9093"

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yaml"

    volumes:
      - ./alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:9093/-/healthy || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  loki:
    image: grafana/loki:3.0.0
    container_name: task-manager-loki
    restart: unless-stopped

    ports:
      - "3100:3100"

    command:
      - "-config.file=/etc/loki/config.yaml"

    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml
      - loki_data:/loki

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:3100/ready"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: task-manager-grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:3000/api/health || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.0.0
    container_name: task-manager-promtail
    restart: unless-stopped

    command:
      - "-config.file=/etc/promtail/config.yaml"

    volumes:
      - ./promtail/config.yaml:/etc/promtail/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  loki_data:
  grafana_data:
  prometheus_data: