global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  - job_name: task-manager-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api:8000

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187